name: Monitor diario de precios

on:
  schedule:
    - cron: '0 10 * * *'   # 07:00 Argentina (UTC-3), todos los dias
  workflow_dispatch: {}     # boton para correrlo a mano

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-fund --no-audit
      - name: Correr monitor
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: node job/monitor.mjs
      - name: Publicar data.json
        run: |
          git config user.name "monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "data $(date -u +%F)"
          git push
